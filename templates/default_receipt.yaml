name: "領収書フォーマットA"
description: "手書き納品書から領収書 txt を生成"
output_format: "txt"
output_filename_pattern: "receipt_{invoice_no}_{issue_date}.txt"
base_template_file: null

extraction_prompt: |
  この納品書画像から以下の項目を抽出してください。
  - 領収書番号 (英数字)
  - 発行日 (YYYY-MM-DD 形式)
  - 宛名 (会社名)
  - 合計金額 (数値、円)

  手書き文字を読み取れない場合は null を返してください。

response_schema:
  type: object
  required: [invoice_no, issue_date, customer_name, total_amount]
  properties:
    invoice_no:
      type: string
      nullable: true
    issue_date:
      type: string
      nullable: true
    customer_name:
      type: string
      nullable: true
    total_amount:
      type: number
      nullable: true

field_placements:
  - source_key: "invoice_no"
    target: "receipt_no"
  - source_key: "issue_date"
    target: "date"
  - source_key: "customer_name"
    target: "customer"
  - source_key: "total_amount"
    target: "amount"
