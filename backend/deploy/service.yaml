# Knative Service 定義 (参考・手動適用用)。
# 通常は deploy/cloudbuild.yaml の gcloud run deploy でデプロイする。
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ocr-automation-backend
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      serviceAccountName: ocr-automation-backend@ocr-automation-493122.iam.gserviceaccount.com
      timeoutSeconds: 120
      containerConcurrency: 20
      containers:
        - image: asia-northeast1-docker.pkg.dev/ocr-automation-493122/ocr-automation/backend:latest
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: BACKEND_PROJECT_ID
              value: "ocr-automation-493122"
            - name: BACKEND_GEMINI_API_KEY_SECRET_NAME
              value: "gemini-api-key"
            - name: BACKEND_LOG_LEVEL
              value: INFO
          ports:
            - containerPort: 8080
