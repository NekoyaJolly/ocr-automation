# 手動ビルド: gcloud builds submit --config deploy/cloudbuild.yaml .
# (backend ディレクトリで実行)。_IMAGE_TAG は省略時 latest。
substitutions:
  _IMAGE_TAG: 'latest'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/ocr-automation/backend:${_IMAGE_TAG}'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/ocr-automation/backend:latest'
      - '-f'
      - 'docker/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/ocr-automation/backend:${_IMAGE_TAG}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/ocr-automation/backend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ocr-automation-backend'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/ocr-automation/backend:${_IMAGE_TAG}'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'ocr-automation-backend@ocr-automation-493122.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'BACKEND_PROJECT_ID=ocr-automation-493122,BACKEND_GEMINI_API_KEY_SECRET_NAME=gemini-api-key'
      - '--allow-unauthenticated'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/ocr-automation/backend:${_IMAGE_TAG}'
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/ocr-automation/backend:latest'
