name: Build and Package App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
      shell: bash

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e .[gui,output]
        uv pip install pyinstaller
      shell: bash

    - name: Build macOS App
      if: matrix.os == 'macos-latest'
      run: |
        source .venv/bin/activate
        pyinstaller build/pyinstaller_mac.spec
        
        # dist „Éá„ā£„É¨„āĮ„Éą„É™„ĀęÁßĽŚčē„Āó„Ā¶ zip ŚúßÁłģ
        cd dist
        zip -r ocr-automation-mac.zip ocr-automation.app
      shell: bash

    - name: Build Windows App
      if: matrix.os == 'windows-latest'
      run: |
        .venv\Scripts\activate
        pyinstaller build/pyinstaller_win.spec
        
        # dist „Éá„ā£„É¨„āĮ„Éą„É™„ĀęÁßĽŚčē„Āó„Ā¶ zip ŚúßÁłģ
        cd dist
        powershell Compress-Archive -Path ocr-automation -DestinationPath ocr-automation-win.zip
      shell: cmd

    - name: Upload macOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ocr-automation-mac
        path: dist/ocr-automation-mac.zip
        retention-days: 7

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ocr-automation-win
        path: dist/ocr-automation-win.zip
        retention-days: 7
